<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextAGI Logo - Comparison</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            padding: 60px 40px;
        }
        
        h1 {
            text-align: center;
            color: #ffffff;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 60px;
            letter-spacing: -1px;
        }
        
        .comparison-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .variant-card {
            background: #1a1a1a;
            border-radius: 24px;
            padding: 60px 40px;
            text-align: center;
        }
        
        .variant-label {
            color: #666;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 40px;
        }
        
        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-bottom: 40px;
        }
        
        .logo-icon {
            width: 64px;
            height: 64px;
        }
        
        .logo-text {
            font-size: 42px;
            font-weight: 700;
            letter-spacing: -2px;
            color: #ffffff;
        }
        
        .logo-text span {
            color: #999999;
        }
        
        .description {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
        }
        
        .preview-light {
            background: #ffffff;
            padding: 40px;
            border-radius: 16px;
            margin-top: 20px;
        }
        
        .preview-light .logo-text {
            color: #1d1d1f;
        }
        
        .preview-light .logo-text span {
            color: #86868b;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
        
        .glow-dot {
            animation: pulse 2s ease-in-out infinite;
        }
        
        .glow-dot:nth-child(2) { animation-delay: 0.3s; }
        .glow-dot:nth-child(3) { animation-delay: 0.6s; }
    </style>
</head>
<body>
    <h1>NextAGI Logo Variants</h1>
    
    <div class="comparison-grid">
        <!-- Variant 1: Neural Network -->
        <div class="variant-card">
            <div class="variant-label">Variant 1</div>
            <div class="logo-container">
                <svg class="logo-icon" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="16" cy="16" r="3" fill="#2997ff" opacity="0.8"/>
                    <circle cx="32" cy="16" r="3" fill="#2997ff" opacity="0.8"/>
                    <circle cx="48" cy="16" r="3" fill="#2997ff" opacity="0.8"/>
                    <circle cx="12" cy="32" r="3" fill="#2997ff" opacity="0.8"/>
                    <circle cx="28" cy="32" r="3" fill="#2997ff" opacity="0.8"/>
                    <circle cx="44" cy="32" r="3" fill="#2997ff" opacity="0.8"/>
                    <circle cx="56" cy="32" r="3" fill="#2997ff" opacity="0.8"/>
                    <circle cx="20" cy="48" r="3" fill="#2997ff" opacity="0.8"/>
                    <circle cx="36" cy="48" r="3" fill="#2997ff" opacity="0.8"/>
                    <circle cx="52" cy="48" r="3" fill="#2997ff" opacity="0.8"/>
                    <line x1="16" y1="16" x2="12" y2="32" stroke="#2997ff" stroke-width="1.5" opacity="0.4"/>
                    <line x1="16" y1="16" x2="28" y2="32" stroke="#2997ff" stroke-width="1.5" opacity="0.4"/>
                    <line x1="32" y1="16" x2="28" y2="32" stroke="#2997ff" stroke-width="1.5" opacity="0.4"/>
                    <line x1="32" y1="16" x2="44" y2="32" stroke="#2997ff" stroke-width="1.5" opacity="0.4"/>
                    <line x1="32" y1="16" x2="56" y2="32" stroke="#2997ff" stroke-width="1.5" opacity="0.4"/>
                    <line x1="48" y1="16" x2="44" y2="32" stroke="#2997ff" stroke-width="1.5" opacity="0.4"/>
                    <line x1="48" y1="16" x2="56" y2="32" stroke="#2997ff" stroke-width="1.5" opacity="0.4"/>
                    <line x1="12" y1="32" x2="20" y2="48" stroke="#2997ff" stroke-width="1.5" opacity="0.4"/>
                    <line x1="28" y1="32" x2="20" y2="48" stroke="#2997ff" stroke-width="1.5" opacity="0.4"/>
                    <line x1="28" y1="32" x2="36" y2="48" stroke="#2997ff" stroke-width="1.5" opacity="0.4"/>
                    <line x1="44" y1="32" x2="36" y2="48" stroke="#2997ff" stroke-width="1.5" opacity="0.4"/>
                    <line x1="44" y1="32" x2="52" y2="48" stroke="#2997ff" stroke-width="1.5" opacity="0.4"/>
                    <line x1="56" y1="32" x2="52" y2="48" stroke="#2997ff" stroke-width="1.5" opacity="0.4"/>
                </svg>
                <div class="logo-text">Next<span>AGI</span></div>
            </div>
            <div class="description">Neural Network<br>Direct AI/ML representation with interconnected nodes</div>
        </div>
        
        <!-- Variant 2: Geometric -->
        <div class="variant-card">
            <div class="variant-label">Variant 2</div>
            <div class="logo-container">
                <svg class="logo-icon" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#2997ff;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#5ac8fa;stop-opacity:1" />
                        </linearGradient>
                    </defs>
                    <polygon points="32,8 52,20 52,44 32,56 12,44 12,20" 
                             fill="none" stroke="url(#grad1)" stroke-width="2" opacity="0.6"/>
                    <polygon points="32,16 44,40 20,40" 
                             fill="none" stroke="url(#grad1)" stroke-width="2" opacity="0.8"/>
                    <circle cx="32" cy="32" r="4" fill="url(#grad1)"/>
                    <line x1="32" y1="32" x2="32" y2="16" stroke="#2997ff" stroke-width="1.5" opacity="0.5"/>
                    <line x1="32" y1="32" x2="44" y2="40" stroke="#2997ff" stroke-width="1.5" opacity="0.5"/>
                    <line x1="32" y1="32" x2="20" y2="40" stroke="#2997ff" stroke-width="1.5" opacity="0.5"/>
                    <circle cx="32" cy="8" r="2" fill="#2997ff" opacity="0.4"/>
                    <circle cx="52" cy="20" r="2" fill="#2997ff" opacity="0.4"/>
                    <circle cx="52" cy="44" r="2" fill="#2997ff" opacity="0.4"/>
                    <circle cx="32" cy="56" r="2" fill="#2997ff" opacity="0.4"/>
                    <circle cx="12" cy="44" r="2" fill="#2997ff" opacity="0.4"/>
                    <circle cx="12" cy="20" r="2" fill="#2997ff" opacity="0.4"/>
                </svg>
                <div class="logo-text">Next<span>AGI</span></div>
            </div>
            <div class="description">Geometric<br>Hexagonal structure with layered depth</div>
        </div>
        
        <!-- Variant 3: Typography -->
        <div class="variant-card">
            <div class="variant-label">Variant 3</div>
            <div class="logo-container">
                <svg class="logo-icon" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="24" cy="24" r="16" fill="none" stroke="#2997ff" stroke-width="2" opacity="0.3"/>
                    <circle cx="24" cy="24" r="10" fill="none" stroke="#2997ff" stroke-width="1.5" opacity="0.5"/>
                    <circle class="glow-dot" cx="24" cy="8" r="2.5" fill="#2997ff"/>
                    <circle class="glow-dot" cx="40" cy="24" r="2.5" fill="#2997ff"/>
                    <circle class="glow-dot" cx="24" cy="40" r="2.5" fill="#2997ff"/>
                    <circle class="glow-dot" cx="8" cy="24" r="2.5" fill="#2997ff"/>
                    <circle cx="24" cy="24" r="4" fill="#2997ff" opacity="0.8"/>
                    <path d="M24 8 L24 20" stroke="#2997ff" stroke-width="1" opacity="0.4"/>
                    <path d="M40 24 L28 24" stroke="#2997ff" stroke-width="1" opacity="0.4"/>
                    <path d="M24 40 L24 28" stroke="#2997ff" stroke-width="1" opacity="0.4"/>
                    <path d="M8 24 L20 24" stroke="#2997ff" stroke-width="1" opacity="0.4"/>
                </svg>
                <div class="logo-text">Next<span>AGI</span></div>
            </div>
            <div class="description">Typography<br>Animated pulse effect with minimal icon</div>
        </div>
    </div>
</body>
</html>
