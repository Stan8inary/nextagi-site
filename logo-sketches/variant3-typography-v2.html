<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextAGI Logo - Variant 3: Minimal Typography</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
        }
        .logo-container {
            text-align: center;
            padding: 4rem;
        }
        .logo-icon {
            width: 60px;
            height: 60px;
            margin: 0 auto 2rem;
            position: relative;
        }
        .circle {
            width: 60px;
            height: 60px;
            border: 2px solid #3b82f6;
            border-radius: 50%;
            position: relative;
            animation: pulse 3s ease-in-out infinite;
        }
        .circle::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 8px;
            height: 8px;
            background: #3b82f6;
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }
        .logo-text {
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: -0.04em;
            color: #ffffff;
            line-height: 1;
        }
        .logo-text .accent {
            color: #3b82f6;
        }
        .tagline {
            font-size: 0.75rem;
            color: #6b7280;
            margin-top: 1rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4); }
            50% { box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); }
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <div class="logo-icon">
            <div class="circle"></div>
        </div>
        <div class="logo-text">Next<span class="accent">AGI</span></div>
        <div class="tagline">Artificial General Intelligence</div>
    </div>
</body>
</html>
