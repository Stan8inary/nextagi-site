<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextAGI Logo - Variant 3: Typography</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 60px;
        }
        
        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .logo-icon {
            position: relative;
            width: 48px;
            height: 48px;
        }
        
        .logo-text {
            font-size: 48px;
            font-weight: 700;
            letter-spacing: -3px;
            color: #ffffff;
        }
        
        .logo-text span {
            color: #999999;
        }
        
        .preview-light {
            background: #ffffff;
            padding: 80px;
            border-radius: 24px;
        }
        
        .preview-light .logo-text {
            color: #1d1d1f;
        }
        
        .preview-light .logo-text span {
            color: #86868b;
        }
        
        .label {
            color: #666;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }
        
        .preview-section {
            text-align: center;
            padding: 40px;
        }
        
        /* Animated glow effect */
        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
        
        .glow-dot {
            animation: pulse 2s ease-in-out infinite;
        }
        
        .glow-dot:nth-child(2) { animation-delay: 0.3s; }
        .glow-dot:nth-child(3) { animation-delay: 0.6s; }
    </style>
</head>
<body>
    <div class="preview-section">
        <div class="label">Dark Background</div>
        <div class="logo-container">
            <svg class="logo-icon" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                <!-- Abstract AI brain/circuit symbol -->
                <circle cx="24" cy="24" r="16" fill="none" stroke="#2997ff" stroke-width="2" opacity="0.3"/>
                <circle cx="24" cy="24" r="10" fill="none" stroke="#2997ff" stroke-width="1.5" opacity="0.5"/>
                
                <!-- Animated dots -->
                <circle class="glow-dot" cx="24" cy="8" r="2.5" fill="#2997ff"/>
                <circle class="glow-dot" cx="40" cy="24" r="2.5" fill="#2997ff"/>
                <circle class="glow-dot" cx="24" cy="40" r="2.5" fill="#2997ff"/>
                <circle class="glow-dot" cx="8" cy="24" r="2.5" fill="#2997ff"/>
                
                <!-- Center core -->
                <circle cx="24" cy="24" r="4" fill="#2997ff" opacity="0.8"/>
                
                <!-- Circuit lines -->
                <path d="M24 8 L24 20" stroke="#2997ff" stroke-width="1" opacity="0.4"/>
                <path d="M40 24 L28 24" stroke="#2997ff" stroke-width="1" opacity="0.4"/>
                <path d="M24 40 L24 28" stroke="#2997ff" stroke-width="1" opacity="0.4"/>
                <path d="M8 24 L20 24" stroke="#2997ff" stroke-width="1" opacity="0.4"/>
            </svg>
            <div class="logo-text">Next<span>AGI</span></div>
        </div>
    </div>
    
    <div class="preview-section preview-light">
        <div class="label">Light Background</div>
        <div class="logo-container">
            <svg class="logo-icon" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                <circle cx="24" cy="24" r="16" fill="none" stroke="#2997ff" stroke-width="2" opacity="0.3"/>
                <circle cx="24" cy="24" r="10" fill="none" stroke="#2997ff" stroke-width="1.5" opacity="0.5"/>
                <circle class="glow-dot" cx="24" cy="8" r="2.5" fill="#2997ff"/>
                <circle class="glow-dot" cx="40" cy="24" r="2.5" fill="#2997ff"/>
                <circle class="glow-dot" cx="24" cy="40" r="2.5" fill="#2997ff"/>
                <circle class="glow-dot" cx="8" cy="24" r="2.5" fill="#2997ff"/>
                <circle cx="24" cy="24" r="4" fill="#2997ff" opacity="0.8"/>
                <path d="M24 8 L24 20" stroke="#2997ff" stroke-width="1" opacity="0.4"/>
                <path d="M40 24 L28 24" stroke="#2997ff" stroke-width="1" opacity="0.4"/>
                <path d="M24 40 L24 28" stroke="#2997ff" stroke-width="1" opacity="0.4"/>
                <path d="M8 24 L20 24" stroke="#2997ff" stroke-width="1" opacity="0.4"/>
            </svg>
            <div class="logo-text">Next<span>AGI</span></div>
        </div>
    </div>
</body>
</html>
