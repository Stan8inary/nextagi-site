<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextAGI Logo - Comparison</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            padding: 2rem;
        }
        .header {
            text-align: center;
            margin-bottom: 3rem;
            color: #ffffff;
        }
        .header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        .header p {
            color: #6b7280;
            font-size: 0.875rem;
        }
        .comparison {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }
        .variant {
            background: #111111;
            border-radius: 12px;
            padding: 3rem 2rem;
            text-align: center;
            border: 1px solid #222222;
            transition: transform 0.2s, border-color 0.2s;
        }
        .variant:hover {
            transform: translateY(-4px);
            border-color: #3b82f6;
        }
        .variant-title {
            font-size: 0.875rem;
            color: #6b7280;
            margin-bottom: 2rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        .logo-icon {
            width: 120px;
            height: 120px;
            margin: 0 auto 2rem;
            position: relative;
        }
        .logo-text {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            color: #ffffff;
        }
        .logo-text .accent {
            color: #3b82f6;
        }
        .tagline {
            font-size: 0.75rem;
            color: #6b7280;
            margin-top: 0.5rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
        /* Variant 1 - Neural */
        .node {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #3b82f6;
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
        }
        .node:nth-child(1) { top: 20%; left: 50%; animation: pulse 2s ease-in-out infinite; }
        .node:nth-child(2) { top: 40%; left: 20%; animation: pulse 2s ease-in-out 0.3s infinite; }
        .node:nth-child(3) { top: 40%; left: 80%; animation: pulse 2s ease-in-out 0.6s infinite; }
        .node:nth-child(4) { top: 70%; left: 30%; animation: pulse 2s ease-in-out 0.9s infinite; }
        .node:nth-child(5) { top: 70%; left: 70%; animation: pulse 2s ease-in-out 1.2s infinite; }
        /* Variant 2 - Geometric */
        .hexagon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: rotate 8s linear infinite;
        }
        .hexagon-inner {
            width: 40px;
            height: 40px;
            background: #111111;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .variant2 .logo-text .accent {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        /* Variant 3 - Minimal */
        .circle {
            width: 60px;
            height: 60px;
            border: 2px solid #3b82f6;
            border-radius: 50%;
            position: relative;
            animation: pulse 3s ease-in-out infinite;
        }
        .circle::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 8px;
            height: 8px;
            background: #3b82f6;
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }
        .variant3 .logo-text {
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: -0.04em;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        @keyframes rotate {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>NextAGI Logo Concepts</h1>
        <p>3 design directions for your review</p>
    </div>
    <div class="comparison">
        <div class="variant">
            <div class="variant-title">Neural Constellation</div>
            <div class="logo-icon">
                <div class="node"></div>
                <div class="node"></div>
                <div class="node"></div>
                <div class="node"></div>
                <div class="node"></div>
            </div>
            <div class="logo-text">Next<span class="accent">AGI</span></div>
            <div class="tagline">Artificial General Intelligence</div>
        </div>
        <div class="variant variant2">
            <div class="variant-title">Geometric Hexagon</div>
            <div class="logo-icon">
                <div class="hexagon"></div>
                <div class="hexagon-inner"></div>
            </div>
            <div class="logo-text">Next<span class="accent">AGI</span></div>
            <div class="tagline">Artificial General Intelligence</div>
        </div>
        <div class="variant variant3">
            <div class="variant-title">Minimal Typography</div>
            <div class="logo-icon">
                <div class="circle"></div>
            </div>
            <div class="logo-text">Next<span class="accent">AGI</span></div>
            <div class="tagline">Artificial General Intelligence</div>
        </div>
    </div>
</body>
</html>
