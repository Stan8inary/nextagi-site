<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextAGI Logo - Variant 1: Neural Constellation</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
        }
        .logo-container {
            text-align: center;
            padding: 4rem;
        }
        .logo-icon {
            width: 120px;
            height: 120px;
            margin: 0 auto 2rem;
            position: relative;
        }
        .node {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #3b82f6;
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
        }
        .node:nth-child(1) { top: 20%; left: 50%; animation: pulse 2s ease-in-out infinite; }
        .node:nth-child(2) { top: 40%; left: 20%; animation: pulse 2s ease-in-out 0.3s infinite; }
        .node:nth-child(3) { top: 40%; left: 80%; animation: pulse 2s ease-in-out 0.6s infinite; }
        .node:nth-child(4) { top: 70%; left: 30%; animation: pulse 2s ease-in-out 0.9s infinite; }
        .node:nth-child(5) { top: 70%; left: 70%; animation: pulse 2s ease-in-out 1.2s infinite; }
        .connection {
            position: absolute;
            height: 1px;
            background: linear-gradient(90deg, transparent, #3b82f6, transparent);
            transform-origin: left center;
            opacity: 0.6;
        }
        .logo-text {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            color: #ffffff;
        }
        .logo-text .accent {
            color: #3b82f6;
        }
        .tagline {
            font-size: 0.875rem;
            color: #6b7280;
            margin-top: 0.5rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <div class="logo-icon">
            <div class="node"></div>
            <div class="node"></div>
            <div class="node"></div>
            <div class="node"></div>
            <div class="node"></div>
        </div>
        <div class="logo-text">Next<span class="accent">AGI</span></div>
        <div class="tagline">Artificial General Intelligence</div>
    </div>
</body>
</html>
