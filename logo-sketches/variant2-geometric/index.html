<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextAGI Logo - Variant 2: Geometric</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 60px;
        }
        
        .logo-container {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .logo-icon {
            width: 64px;
            height: 64px;
        }
        
        .logo-text {
            font-size: 42px;
            font-weight: 700;
            letter-spacing: -2px;
            color: #ffffff;
        }
        
        .logo-text span {
            color: #666666;
        }
        
        .preview-light {
            background: #ffffff;
            padding: 80px;
            border-radius: 24px;
        }
        
        .preview-light .logo-text {
            color: #1d1d1f;
        }
        
        .preview-light .logo-text span {
            color: #86868b;
        }
        
        .label {
            color: #666;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }
        
        .preview-section {
            text-align: center;
            padding: 40px;
        }
    </style>
</head>
<body>
    <div class="preview-section">
        <div class="label">Dark Background</div>
        <div class="logo-container">
            <svg class="logo-icon" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
                <!-- Abstract geometric AI symbol -->
                <defs>
                    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#2997ff;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#5ac8fa;stop-opacity:1" />
                    </linearGradient>
                </defs>
                
                <!-- Outer hexagon -->
                <polygon points="32,8 52,20 52,44 32,56 12,44 12,20" 
                         fill="none" stroke="url(#grad1)" stroke-width="2" opacity="0.6"/>
                
                <!-- Inner triangle -->
                <polygon points="32,16 44,40 20,40" 
                         fill="none" stroke="url(#grad1)" stroke-width="2" opacity="0.8"/>
                
                <!-- Center node -->
                <circle cx="32" cy="32" r="4" fill="url(#grad1)"/>
                
                <!-- Connecting lines -->
                <line x1="32" y1="32" x2="32" y2="16" stroke="#2997ff" stroke-width="1.5" opacity="0.5"/>
                <line x1="32" y1="32" x2="44" y2="40" stroke="#2997ff" stroke-width="1.5" opacity="0.5"/>
                <line x1="32" y1="32" x2="20" y2="40" stroke="#2997ff" stroke-width="1.5" opacity="0.5"/>
                
                <!-- Corner accents -->
                <circle cx="32" cy="8" r="2" fill="#2997ff" opacity="0.4"/>
                <circle cx="52" cy="20" r="2" fill="#2997ff" opacity="0.4"/>
                <circle cx="52" cy="44" r="2" fill="#2997ff" opacity="0.4"/>
                <circle cx="32" cy="56" r="2" fill="#2997ff" opacity="0.4"/>
                <circle cx="12" cy="44" r="2" fill="#2997ff" opacity="0.4"/>
                <circle cx="12" cy="20" r="2" fill="#2997ff" opacity="0.4"/>
            </svg>
            <div class="logo-text">Next<span>AGI</span></div>
        </div>
    </div>
    
    <div class="preview-section preview-light">
        <div class="label">Light Background</div>
        <div class="logo-container">
            <svg class="logo-icon" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#2997ff;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#5ac8fa;stop-opacity:1" />
                    </linearGradient>
                </defs>
                <polygon points="32,8 52,20 52,44 32,56 12,44 12,20" 
                         fill="none" stroke="url(#grad2)" stroke-width="2" opacity="0.6"/>
                <polygon points="32,16 44,40 20,40" 
                         fill="none" stroke="url(#grad2)" stroke-width="2" opacity="0.8"/>
                <circle cx="32" cy="32" r="4" fill="url(#grad2)"/>
                <line x1="32" y1="32" x2="32" y2="16" stroke="#2997ff" stroke-width="1.5" opacity="0.5"/>
                <line x1="32" y1="32" x2="44" y2="40" stroke="#2997ff" stroke-width="1.5" opacity="0.5"/>
                <line x1="32" y1="32" x2="20" y2="40" stroke="#2997ff" stroke-width="1.5" opacity="0.5"/>
                <circle cx="32" cy="8" r="2" fill="#2997ff" opacity="0.4"/>
                <circle cx="52" cy="20" r="2" fill="#2997ff" opacity="0.4"/>
                <circle cx="52" cy="44" r="2" fill="#2997ff" opacity="0.4"/>
                <circle cx="32" cy="56" r="2" fill="#2997ff" opacity="0.4"/>
                <circle cx="12" cy="44" r="2" fill="#2997ff" opacity="0.4"/>
                <circle cx="12" cy="20" r="2" fill="#2997ff" opacity="0.4"/>
            </svg>
            <div class="logo-text">Next<span>AGI</span></div>
        </div>
    </div>
</body>
</html>
