<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 80" width="400" height="80">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1d1d1f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#424245;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Icon: Abstract N + neural node -->
  <g transform="translate(0, 10)">
    <!-- Left vertical bar -->
    <rect x="8" y="8" width="6" height="44" rx="2" fill="url(#grad)"/>

    <!-- Right vertical bar -->
    <rect x="38" y="8" width="6" height="44" rx="2" fill="url(#grad)"/>

    <!-- Diagonal connector -->
    <line x1="11" y1="12" x2="35" y2="48" stroke="url(#grad)" stroke-width="4" stroke-linecap="round"/>

    <!-- Neural nodes -->
    <circle cx="23" cy="18" r="3" fill="#2997ff"/>
    <circle cx="29" cy="30" r="2.5" fill="#2997ff" opacity="0.7"/>
    <circle cx="20" cy="42" r="2" fill="#2997ff" opacity="0.5"/>
  </g>

  <!-- Text: NextAGI -->
  <text x="60" y="50" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="42" font-weight="700" letter-spacing="-1.5" fill="#1d1d1f">
    Next<tspan fill="#86868b">AGI</tspan>
  </text>
</svg>
